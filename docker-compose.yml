services:
  # --- Base de Datos PostgreSQL ---
  db:
    image: postgres:15-alpine
    container_name: smartgym-db

    restart: unless-stopped # Reinicia automáticamente si falla

    environment:
      # Se pueden listar con guion e =, es decir   - POSTGRES_USER=${POSTGRES_USER:-smartgym_user}
      # o como diccionario CLAVE: VALOR, es decir  POSTGRES_USER: ${POSTGRES_USER:-smartgym_user}
      # NO MEZCLAR en el mismo bloque :)

      POSTGRES_USER: ${POSTGRES_USER:-smartgym_user} # Toma valor del .env, si no existe, usa los sugeridos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartgym_pass}
      POSTGRES_DB: ${POSTGRES_DB:-smartgym_db}
      #POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    ports:
      # Si no existe el puerto externo, use ese por defecto
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - smartgym_data:/var/lib/postgresql/data
      #- ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ] # doble $$ para que Docker use la variable dentro del contenedor
      interval: 10s
      timeout: 5s
      retries: 5

  # --- API SmartGym ---
  api:
    build: .
    container_name: smartgym-api
    restart: unless-stopped
    ports:
      # Si no existe el puerto externo, use ese por defecto
      - "${PORT:-8000}:8000"
    environment:
      # Pasamos las variables al contenedor de la API para que BaseSettings las lea
      POSTGRES_HOST: db # Nombre del servicio de arriba, de la base de datos
      DATABASE_URL: postgresql://${POSTGRES_USER:-smartgym_user}:${POSTGRES_PASSWORD:-smartgym_pass}@db:5432/${POSTGRES_DB:-smartgym_db}
      PYTHONPATH: /app
      SECRET_KEY: ${SECRET_KEY:-a7f3b9c2d4e6f8a1b3c5d7e9f0a2b4c6}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      db:

        condition: service_healthy # Espera a que DB esté saludable/lista
    volumes:
      - ./app:/app/app # Monta /app en /app/app y permite que el --reload funcione
      - ./migrations:/app/migrations # Sincroniza la carpeta de migraciones
      - ./alembic.ini:/app/alembic.ini # Sincroniza la configuración de alembic
      #- ./.env:/app/.env        # Monta el archivo .env
    env_file:
      - .env # Carga las claves verdaderas
    # Comando de inicio: 
    # 1. 'sleep 5' da tiempo a Postgres para que termine de inicializarse.
    # 2. 'alembic upgrade head' aplica automáticamente los cambios de tablas en la DB.
    # 3. 'uvicorn...' arranca finalmente la API.
    command: >
      sh -c "sleep 5 && 
             alembic upgrade head && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  smartgym_data:
    name: mi_smartgym_data
    driver: local
